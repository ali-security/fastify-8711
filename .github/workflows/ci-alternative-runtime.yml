name: ci Alternative Runtimes

on:
  push:
    branches:
     - main
     - next
     - v*
    paths-ignore:
     - docs/**
     - '*.md'
  pull_request:
    paths-ignore:
     - docs/**
     - '*.md'

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test-unit:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
        os: [macos-14, ubuntu-24.04, windows-2022]
        include:
         - runtime: nsolid
           node-version: 18
           nsolid-version: 5
         - runtime: nsolid
           node-version: 20
           nsolid-version: 5
    steps:
     - uses: actions/checkout@v4
       with:
         persist-credentials: false

     - uses: actions/setup-node@v4
       if: ${{ matrix.runtime == 'nsolid' && matrix.node-version == 18 }}
       with:
         node-version: ${{ matrix.node-version }}

     - uses: nodesource/setup-nsolid@v1
       if: ${{ matrix.runtime == 'nsolid' && matrix.node-version != 18 }}
       with:
         node-version: ${{ matrix.node-version }}
         nsolid-version: ${{ matrix.nsolid-version }}

     - name: Install
       run: |
         npm install --ignore-scripts

     - name: Run tests
       run: |
         npm run unit

  test-typescript:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
     - uses: actions/checkout@v4
       with:
         persist-credentials: false

     - uses: nodesource/setup-nsolid@v1
       with:
         node-version: 20
         nsolid-version: 5

     - name: Install
       run: |
         npm install --ignore-scripts

     - name: Run typescript tests
       run: |
         npm run test:typescript
       env:
         NODE_OPTIONS: no-network-family-autoselection

  package:
    needs:
     - test-typescript
     - test-unit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
     - uses: actions/checkout@v4
       with:
         persist-credentials: false
     - uses: nodesource/setup-nsolid@v1
       with:
         nsolid-version: 5
     - name: install fastify
       run: |
         npm install --ignore-scripts
     - name: install webpack stack
       run: |
         cd test/bundler/webpack && npm install
     - name: Test webpack bundle
       run: |
         cd test/bundler/webpack && npm run test
     - name: install esbuild stack
       run: |
         cd test/bundler/esbuild && npm install
     - name: Test esbuild bundle
       run: |
         cd test/bundler/esbuild && npm run test

  automerge:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'dependabot[bot]'
    needs:
     - test-typescript
     - test-unit
     - package
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
      contents: write
    steps:
     - uses: fastify/github-action-merge-dependabot@v3
       with:
         github-token: ${{ secrets.GITHUB_TOKEN }}
